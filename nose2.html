<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>XP.RUN - Live Sandbox</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #0b0f19;
  color: #e5e9f0;
  font-family: system-ui, sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  border-bottom: 1px solid #1f2933;
}

header img {
  width: 42px;
  height: 42px;
  border-radius: 50%;
}

main {
  flex: 1;
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 16px;
  padding: 16px;
}

.card {
  background: #111827;
  border: 1px solid #1f2933;
  border-radius: 10px;
  padding: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

.card h2 {
  margin: 0 0 10px;
  font-size: 17px;
}

#captureBox {
  width: 100%;
  height: 260px;
  background: #020617;
  border: 1px solid #1f2933;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}

#captureBox img {
  max-width: 100%;
  max-height: 100%;
  border-radius: 8px;
}

.logs {
  background: #020617;
  border: 1px solid #1f2933;
  border-radius: 8px;
  padding: 10px;
  height: 180px;
  overflow-y: auto;
  font-family: monospace;
  font-size: 12px;
  white-space: pre-wrap;
}

#chatBox {
  background: #020617;
  border: 1px solid #1f2933;
  border-radius: 8px;
  padding: 10px;
  height: 200px;
  overflow-y: auto;
  font-size: 13px;
}

input, button {
  width: 100%;
  padding: 8px;
  margin-top: 8px;
  border-radius: 6px;
  border: none;
  font-size: 14px;
}

button {
  background: #2563eb;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

footer {
  padding: 10px;
  text-align: center;
  font-size: 12px;
  color: #6b7280;
  border-top: 1px solid #1f2933;
}
</style>
</head>

<body>

<header>
  <img src="logo.png">
  <div>
    <h1 style="margin:0; font-size:20px;">XP.RUN</h1>
    <small>Live Sandbox Monitor</small>
  </div>
</header>

<main>

  <!-- PANEL SANDBOX -->
  <section class="card">
    <h2>Sandbox View</h2>
    <div id="captureBox">
      <span>Cargando captura...</span>
    </div>

    <h3 style="margin-top:15px;">Logs</h3>
    <div class="logs" id="logsBox">[XP.RUN] Esperando datos...</div>
  </section>

  <!-- PANEL CHAT -->
  <section class="card">
    <h2>Chat en tiempo real</h2>
    <div id="chatBox">Cargando chat...</div>

    <input id="chatInput" placeholder="Escribe un mensaje o comando (/start, /stop, /capture)">
    <button onclick="sendMessage()">Enviar</button>
  </section>

</main>

<footer>
  XP.RUN · Powered by XPAnalyzer · GitHub Pages
</footer>

<script>
// =============================
// CAPTURA EN VIVO
// =============================
function updateCapture() {
  const img = document.createElement("img");
  img.src = "https://raw.githubusercontent.com/TU_USUARIO/TU_REPO/main/capture.png?cache=" + Date.now();
  img.onerror = () => {
    document.getElementById("captureBox").innerHTML = "<span>No hay captura aún...</span>";
  };
  img.onload = () => {
    document.getElementById("captureBox").innerHTML = "";
    document.getElementById("captureBox").appendChild(img);
  };
}
setInterval(updateCapture, 2000);
updateCapture();

// =============================
// LOGS EN VIVO
// =============================
async function updateLogs() {
  try {
    const res = await fetch("https://raw.githubusercontent.com/TU_USUARIO/TU_REPO/main/logs.txt?cache=" + Date.now());
    const text = await res.text();
    document.getElementById("logsBox").textContent = text;
  } catch {}
}
setInterval(updateLogs, 2000);
updateLogs();

// =============================
// CHAT EN VIVO
// =============================
async function loadChat() {
  try {
    const res = await fetch("https://raw.githubusercontent.com/TU_USUARIO/TU_REPO/main/chat.json?cache=" + Date.now());
    const chat = await res.json();
    const box = document.getElementById("chatBox");
    box.innerHTML = "";
    chat.forEach(m => {
      box.innerHTML += `<div><b>${m.user}:</b> ${m.msg}</div>`;
    });
    box.scrollTop = box.scrollHeight;
  } catch {}
}
setInterval(loadChat, 2000);
loadChat();

// =============================
// ENVIAR MENSAJE (solo tú)
// =============================
function sendMessage() {
  const msg = document.getElementById("chatInput").value.trim();
  if (!msg) return;

  alert("⚠ Este HTML no puede escribir en GitHub.\nDebes usar tu script para agregar el mensaje:\n\n" + msg);

  document.getElementById("chatInput").value = "";
}
</script>

</body>
</html>
